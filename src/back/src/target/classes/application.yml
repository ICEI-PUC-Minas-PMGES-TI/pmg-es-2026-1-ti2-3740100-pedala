spring:
  application:
    name: pedala-api

  datasource:
    url: ${DB_URL:jdbc:sqlserver://pedaladb.database.windows.net:1433;database=pedaladatabase;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30}
    username: ${DB_USER:pedalaadmin}
    password: ${DB_PASSWORD:Admin123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: PedalaPool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      validation-timeout: 5000
      initialization-fail-timeout: -1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false
    url: ${DB_URL:jdbc:sqlserver://pedaladb.database.windows.net:1433;database=pedaladatabase;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30}
    user: ${DB_USER:pedalaadmin}
    password: ${DB_PASSWORD:Admin123}

  cache:
    type: caffeine

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:pedala_secret_key_2024_poc_spring_boot_migration_very_long_key_256bits}
    expiration-ms: 604800000  # 7 days
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-types: image/jpeg,image/png,image/webp,image/gif
    max-size-mb: 8

  groq:
    api-key: ${GROQ_API_KEY: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}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}

logging:
  level:
    com.pedala: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
